<svg width="200" height="60" viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2A9A7D"/>
      <stop offset="100%" stop-color="#1F7A64"/>
    </linearGradient>
  </defs>
  <!-- Logo mark: rounded square with peso sign -->
  <rect x="4" y="8" width="44" height="44" rx="12" fill="url(#logoGrad)"/>
  <text x="26" y="40" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="28" font-weight="700">₱</text>
  <!-- Wordmark -->
  <text x="58" y="40" fill="#1C221D" font-family="Inter, sans-serif" font-size="28" font-weight="700" letter-spacing="-0.5">Pera</text>
  <!-- Tagline -->
  <text x="58" y="52" fill="#8A9387" font-family="Inter, sans-serif" font-size="9" font-weight="400" letter-spacing="1.5" text-transform="uppercase">HOUSEHOLD TRACKER</text>
</svg>